<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Continuous Timetable with Custom Days</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .schedule-container {
            display: flex;
        }

        .time-column {
            width: 60px;
            margin-right: 10px;
            position: relative;
        }

        .time-label {
            position: absolute;
            left: 0;
            width: 100%;
            text-align: right;
            font-size: 14px;
            font-weight: bold;
        }

        .days-container {
            flex: 1;
            display: flex;
        }

        .day-column {
            flex: 1;
            border: 1px solid #ccc;
            position: relative;
            margin-right: 2px;
        }

            .day-column:last-child {
                margin-right: 0;
            }

        .hour-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: #eee;
        }

        .block {
            position: absolute;
            left: 2px;
            right: 2px;
            font-size: 13px;
            font-weight: bold;
            color: #000;
            overflow: hidden;
            padding: 4px;
            box-sizing: border-box;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h2>Schedule</h2>
    <label>Select week:</label>
    <select id="weekSelect"></select>

    <div class="schedule-container" id="scheduleContainer">
        <div class="time-column" id="timeColumn"></div>
        <div class="days-container" id="daysContainer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
